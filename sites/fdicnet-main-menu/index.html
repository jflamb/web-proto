<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FDICNet Main Menu</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
      integrity="sha384-6p9AefaqUhEVheRlj1mpAkbngHXy9mbYMrIdcIt4Jlc9lOLIablJq3bBsLOjGwZ7"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="menuLiveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <noscript>
      <div class="noscript-notice" role="status" aria-live="polite">
        JavaScript is required to use the FDICnet main menu prototype. Please enable JavaScript and reload this
        page.
      </div>
    </noscript>
    <header class="fdic-header" id="fdicHeader">
      <div class="fdic-masthead">
        <div class="fdic-shell">
          <div class="fdic-brand-row">
            <button
              id="fdicNavToggle"
              class="fdic-nav-toggle fdic-nav-toggle--masthead"
              type="button"
              aria-controls="fdicNavList"
              aria-expanded="false"
            >
              <i class="ph ph-list" aria-hidden="true"></i>
              <span>Menu</span>
            </button>
            <a class="fdic-wordmark" href="#" aria-label="FDICnet home">
              <img src="assets/FDICnet.svg" width="140" height="35" alt="FDICnet" />
            </a>
          </div>
          <div class="fdic-controls" role="group" aria-label="Header controls">
            <div class="fdic-control-icons">
              <button class="icon-button" type="button" aria-label="Apps">
                <i class="ph ph-squares-four" aria-hidden="true"></i>
              </button>
              <button class="icon-button" type="button" aria-label="Profile">
                <i class="ph ph-user-circle" aria-hidden="true"></i>
              </button>
            </div>
            <button id="mobileSearchToggle" class="icon-button icon-button--search-toggle" type="button" aria-expanded="false" aria-controls="mobileSearchRow" aria-label="Open search">
              <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
            </button>
            <div class="site-search-field">
              <label class="search-input">
                <span class="sr-only">Search</span>
                <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                <input id="desktopSearchInput" type="search" role="combobox" aria-expanded="false" aria-controls="desktopSearchResults" aria-autocomplete="list" aria-haspopup="listbox" placeholder="Search FDICnet" autocomplete="off" />
              </label>
              <button id="desktopSearchClear" class="search-clear" type="button" aria-label="Clear search" hidden>
                <i class="ph ph-x" aria-hidden="true"></i>
              </button>
              <button id="desktopSearchSubmit" class="search-submit" type="button" aria-label="Open first matching result">
                <i class="ph ph-arrow-right" aria-hidden="true"></i>
              </button>
              <section id="desktopSearchPanel" class="site-search-panel" hidden aria-label="Search suggestions">
                <ul id="desktopSearchResults" class="site-search-results" role="listbox" aria-label="Matching menu content"></ul>
                <p id="desktopSearchStatus" class="site-search-status" role="status" aria-live="polite"></p>
              </section>
            </div>
          </div>
          <div id="mobileSearchRow" class="mobile-search-overlay" hidden>
            <section class="mobile-search-sheet" aria-labelledby="mobileSearchTitle">
              <h2 id="mobileSearchTitle" class="sr-only">Search FDICnet</h2>
              <div class="site-search-field site-search-field--mobile">
                <div class="mobile-search-input-row">
                  <label class="search-input search-input--mobile">
                    <span class="sr-only">Search</span>
                    <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
                    <input id="mobileSearchInput" type="search" role="combobox" aria-expanded="false" aria-controls="mobileSearchResults" aria-autocomplete="list" aria-haspopup="listbox" placeholder="Search FDICnet" autocomplete="off" />
                  </label>
                  <button id="mobileSearchClear" class="search-clear" type="button" aria-label="Clear search" hidden>
                    <i class="ph ph-x" aria-hidden="true"></i>
                  </button>
                  <button id="mobileSearchSubmit" class="search-submit" type="button" aria-label="Open first matching result">
                    <i class="ph ph-arrow-right" aria-hidden="true"></i>
                  </button>
                </div>
              </div>
              <ul id="mobileSearchResults" class="site-search-results" role="listbox" aria-label="Matching menu content"></ul>
              <p id="mobileSearchStatus" class="site-search-status" role="status" aria-live="polite"></p>
            </section>
          </div>
        </div>
      </div>

      <fdic-top-nav id="fdicTopNav"></fdic-top-nav>
      <div
        id="mobileNavBackdrop"
        class="mobile-nav-backdrop"
        hidden
      ></div>

      <fdic-mega-menu id="fdicMegaMenu"></fdic-mega-menu>
    </header>
    <div id="megaMenuScrim" class="mega-menu-scrim" aria-hidden="true" role="presentation"></div>

    <main class="page-content">
      <div class="fdic-shell">
        <h1 id="pageTitle"></h1>
        <div id="pageIntro"></div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"
      integrity="sha384-+pxiN6T7yvpryuJmE1gM9PX7yQit15auDb+ZwwvJOd/4be2Cie5/IuVXgQb/S9du"
      crossorigin="anonymous"
    ></script>
    <script src="runtime.js"></script>
    <script src="components.js"></script>
    <script src="state.js"></script>
    <script src="search.js"></script>
    <script src="mobile-drawer.js"></script>
    <script src="events.js"></script>
    <script src="init.js"></script>
    <script src="script.js"></script>
  </body>
</html>
