<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FDICNet Main Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,opsz,wght@0,8..60,200..900&display=swap"
    />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="fdic-header" id="fdicHeader">
      <div class="fdic-masthead">
        <div class="fdic-shell">
          <a class="fdic-wordmark" href="#" aria-label="FDICnet home">
            <img src="assets/FDICnet.svg" width="140" height="35" alt="FDICnet" />
          </a>
          <div class="fdic-controls" aria-label="Header controls">
            <button class="icon-button" type="button" aria-label="Profile">
              <i class="ph ph-user-circle" aria-hidden="true"></i>
            </button>
            <label class="search-input">
              <span class="sr-only">Search</span>
              <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
              <input type="search" placeholder="Search FDICnet" />
            </label>
          </div>
        </div>
      </div>

      <nav class="fdic-nav" aria-label="Primary navigation">
        <div class="fdic-shell">
          <ul id="fdicNavList" class="fdic-nav-list"></ul>
        </div>
      </nav>

      <section id="megaMenu" class="mega-menu" aria-label="News and Events menu">
        <div class="fdic-shell mega-menu-inner">
          <section class="mega-col mega-col--l1" aria-labelledby="l1Heading">
            <h2 id="l1Heading" class="sr-only">Level 1</h2>
            <ul id="l1List" class="menu-list" role="list"></ul>
            <div class="overview-link-wrap">
              <a id="l1OverviewLink" class="overview-link" href="#">Overview</a>
            </div>
          </section>

          <section class="mega-col mega-col--l2" aria-labelledby="l2Heading">
            <h2 id="l2Heading" class="sr-only">Level 2</h2>
            <ul id="l2List" class="menu-list" role="list"></ul>
          </section>

          <section class="mega-col mega-col--l3" aria-labelledby="l3Heading">
            <h2 id="l3Heading" class="sr-only">Level 3</h2>
            <div id="l3Description" class="menu-description"></div>
            <ul id="l3List" class="menu-list menu-list--l3" role="list"></ul>
          </section>
        </div>
      </section>
    </header>

    <main class="page-content">
      <div class="fdic-shell">
        <h1 id="pageTitle"></h1>
        <div id="pageIntro"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
