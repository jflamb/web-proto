<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FDICNet Main Menu</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
      integrity="sha384-6p9AefaqUhEVheRlj1mpAkbngHXy9mbYMrIdcIt4Jlc9lOLIablJq3bBsLOjGwZ7"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <noscript>
      <div class="noscript-notice" role="status" aria-live="polite">
        JavaScript is required to use the FDICnet main menu prototype. Please enable JavaScript and reload this
        page.
      </div>
    </noscript>
    <header class="fdic-header" id="fdicHeader">
      <div class="fdic-masthead">
        <div class="fdic-shell">
          <div class="fdic-brand-row">
            <button
              id="fdicNavToggle"
              class="fdic-nav-toggle fdic-nav-toggle--masthead"
              type="button"
              aria-controls="fdicNavList"
              aria-expanded="false"
            >
              <i class="ph ph-list" aria-hidden="true"></i>
              <span>Menu</span>
            </button>
            <a class="fdic-wordmark" href="#" aria-label="FDICnet home">
              <img src="assets/FDICnet.svg" width="140" height="35" alt="FDICnet" />
            </a>
          </div>
          <div class="fdic-controls" aria-label="Header controls">
            <div class="fdic-control-icons">
              <button class="icon-button" type="button" aria-label="Apps">
                <i class="ph ph-squares-four" aria-hidden="true"></i>
              </button>
              <button class="icon-button" type="button" aria-label="Profile">
                <i class="ph ph-user-circle" aria-hidden="true"></i>
              </button>
            </div>
            <button id="mobileSearchToggle" class="icon-button icon-button--search-toggle" type="button" aria-expanded="false" aria-controls="mobileSearchRow" aria-label="Open search">
              <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
            </button>
            <label class="search-input">
              <span class="sr-only">Search</span>
              <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
              <input id="desktopSearchInput" type="search" placeholder="Search FDICnet" />
            </label>
          </div>
        </div>
      </div>
      <div id="mobileSearchRow" class="mobile-search-row" hidden>
        <div class="fdic-shell">
          <label class="search-input search-input--mobile">
            <span class="sr-only">Search</span>
            <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
            <input id="mobileSearchInput" type="search" placeholder="Search FDICnet" />
          </label>
        </div>
      </div>

      <nav class="fdic-nav" aria-label="Primary navigation">
        <div class="fdic-shell">
          <ul id="fdicNavList" class="fdic-nav-list"></ul>
        </div>
      </nav>
      <div id="mobileNavBackdrop" class="mobile-nav-backdrop" hidden></div>

      <section id="megaMenu" class="mega-menu" aria-label="Main menu">
        <div id="mobileMenu" class="fdic-shell mega-mobile" aria-label="Mobile menu"></div>

        <div class="fdic-shell mega-menu-inner">
          <section class="mega-col mega-col--l1" aria-labelledby="l1Heading">
            <h2 id="l1Heading" class="sr-only">Level 1</h2>
            <ul id="l1List" class="menu-list" aria-labelledby="l1Heading"></ul>
            <div class="overview-link-wrap">
              <a id="l1OverviewLink" class="overview-link" href="#">Overview</a>
            </div>
          </section>

          <section class="mega-col mega-col--l2" aria-labelledby="l2Heading">
            <h2 id="l2Heading" class="sr-only">Level 2</h2>
            <ul id="l2List" class="menu-list" aria-labelledby="l2Heading"></ul>
          </section>

          <section class="mega-col mega-col--l3" aria-labelledby="l3Heading">
            <h2 id="l3Heading" class="sr-only">Level 3</h2>
            <div id="l3Description" class="menu-description"></div>
            <ul id="l3List" class="menu-list menu-list--l3" role="list"></ul>
          </section>
        </div>
      </section>
    </header>

    <main class="page-content">
      <div class="fdic-shell">
        <h1 id="pageTitle"></h1>
        <div id="pageIntro"></div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"
      integrity="sha384-+pxiN6T7yvpryuJmE1gM9PX7yQit15auDb+ZwwvJOd/4be2Cie5/IuVXgQb/S9du"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
